{% extends "base.html" %}
{% block content %}
<section class="card app-card">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h5 mb-0">解析文本：{{ doc.title }}</h1>
      <a class="btn btn-outline-secondary" href="{{ url_for('knowledge.knowledge_detail', doc_id=doc.id) }}">返回详情</a>
    </div>
    {% if content %}
      <pre style="white-space: pre-wrap; word-break: break-word; max-height: 70vh; overflow: auto;">{{ content }}</pre>
    {% else %}
      <p class="text-muted mb-0">暂无文本。</p>
    {% endif %}
  </div>
</section>
{% endblock %}
