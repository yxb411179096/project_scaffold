<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>高中英语 AI PPT 生成系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg app-navbar">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('ppt.index') }}">
      <span class="brand-kicker">Senior English</span>
      <span class="brand-title">AI PPT Studio</span>
    </a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="{{ url_for('ppt.new_task') }}">新建课件</a>
      <a class="nav-link" href="{{ url_for('ppt.from_manuscript') }}">文案转 PPT</a>
      <a class="nav-link" href="{{ url_for('knowledge.knowledge_list') }}">知识库</a>
      <a class="nav-link" href="{{ url_for('ppt.tasks') }}">课件任务</a>
      <a class="nav-link" href="{{ url_for('ppt.ai_models_settings') }}">模型设置</a>
    </div>
  </div>
</nav>
<main class="container py-4 py-lg-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert {% if category == 'danger' %}alert-danger{% elif category == 'warning' %}alert-warning{% else %}alert-success{% endif %} app-alert">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
